<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库文档 - 在线笔记系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.10.1/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.10.4/dist/index.css">
    <link rel="stylesheet" href="./css/notes.css">
</head>

<body>
<div class="notes-page">
    <div class="notes-shell">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-top">
                <button id="backToKb" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    返回知识库
                </button>
                <button id="collapseBtn" class="collapse-btn" title="收起目录">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <div class="sidebar-hero">
                <div id="currentKbTitle" class="sidebar-title">当前知识库</div>
            </div>

            <div class="sidebar-tools">
                <div class="search-field">
                    <i class="fas fa-search"></i>
                    <input type="text" id="noteSearch" class="note-search" placeholder="搜索文档标题或内容">
                </div>
                <div class="menu-trigger">
                    <button id="addItemBtn" class="quick-create-btn" title="新建">
                        <i class="fas fa-plus"></i>
                    </button>
                    <div id="add-item-menu" class="action-menu menu-right" onclick="event.stopPropagation();">
                        <button onclick="event.stopPropagation(); createGroup(selectedGroupId); closeAllMenus();">新建分组</button>
                        <button onclick="event.stopPropagation(); createNoteWithGroup(selectedGroupId); closeAllMenus();">新建文档</button>
                    </div>
                </div>
            </div>

            <div id="notesTree" class="notes-tree"></div>
        </aside>

        <div id="resizer" class="resizer"></div>

        <main class="workspace">
            <button id="expandSidebarBtn" class="expand-sidebar-btn" title="展开目录">
                <i class="fas fa-chevron-right"></i>
            </button>

            <section id="overviewState" class="overview-state"></section>

            <section id="editorSection" class="editor-section" style="display: none;">
                <div class="editor-header">
                    <div class="editor-title-row">
                        <input id="noteTitleInput" class="note-title-input" type="text" placeholder="请输入文档标题">
                        <div id="editorMeta" class="editor-meta"></div>
                    </div>
                </div>
                <div id="vditorContainer" class="vditor-container"></div>
            </section>
        </main>
    </div>
</div>

<div id="saveIndicator" class="save-indicator">
    <i class="fas fa-check"></i>
    <span>已保存</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.10.1/sweetalert2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vditor@3.10.4/dist/index.min.js"></script>
<script src="./js/notes-api.js"></script>
<script src="./js/notes-state.js"></script>
<script src="./js/notes-tree.js"></script>
<script src="./js/notes-editor.js"></script>
<script src="./js/notes-page.js"></script>
</body>

</html>
